# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        # Install graphviz
        python -m pip install --upgrade pip
        pip install pyhmmer Pillow pandas seaborn networkx scipy statsmodels esmecata
    - name: Prepare environment
      run: |
        python -m pip install --upgrade pip
        pip install .
    - name: Test with pytest
      run: |
        pip install pytest
        cd tests
        pytest test_custom_db.py
        pytest test_database.py
        pytest test_diagram_cycles.py
        pytest test_group_stats.py
        pytest test_hmm_search.py
        pytest test_utils.py
        pytest test_visualisation.py
